<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Анонимный Форум</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="ageModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">Внимание</h2>
            <p id="modalText">Вам есть 18 лет?</p>
            <button id="btnYes">Да</button>
            <button id="btnNo">Нет</button>
        </div>
    </div>

    <div class="container" id="mainContent" style="display:none;">
        <div class="header">
            <input type="text" id="searchInput" placeholder="Поиск по постам...">
        </div>

        <form id="postForm">
            <textarea id="postText" placeholder="Напиши что-нибудь..." required></textarea>
            <input type="file" id="postFile" accept="image/*,video/*">
            <button type="submit" id="submitPost">Опубликовать</button>
        </form>

        <div id="feed"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
